<mat-card class="dept-card">
  <button
    mat-icon-button
    color="warn"
    class="delete-btn"
    (click)="delete($event)"
    matTooltip="Delete Department"
  >
    <mat-icon>delete</mat-icon>
  </button>
  <mat-card-content>
    <div class="icon-wrapper oncology-icon">
      <mat-icon>{{ iconName() }}</mat-icon>
    </div>
    <h2 class="dept-name">{{ name() }}</h2>
    @if (description() !== null) {
      <p class="dept-desc">
        {{ description() }}
      </p>
    }
  </mat-card-content>
</mat-card>
