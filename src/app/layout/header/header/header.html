<header class="navbar">
  <!-- Left Side: Search Bar -->
  <div class="search-container">
    <mat-icon class="search-icon">search</mat-icon>
    <input type="text" class="search-input" placeholder="Search patients, records, or department" />
  </div>

  <!-- Right Side: Actions & Profile -->
  <div class="navbar-actions">
    <!-- Icon Group -->
    <div class="icon-group">
      <button mat-icon-button class="action-btn">
        <mat-icon>notifications_none</mat-icon>
      </button>
      <button mat-icon-button class="action-btn">
        <mat-icon>mail_outline</mat-icon>
      </button>
      <button mat-icon-button class="action-btn">
        <mat-icon>dark_mode</mat-icon>
      </button>
      <button mat-icon-button class="action-btn">
        <mat-icon>language</mat-icon>
      </button>
    </div>

    <!-- Vertical Divider -->
    <div class="divider"></div>

    <!-- User Profile -->
    <div class="user-profile">
      <div class="user-info">
        <span class="user-name">Dr. Julian Vance</span>
        <span class="user-role">CHIEF MEDICAL OFFICER</span>
      </div>
      <!-- Placeholder image for the avatar -->
      <img src="https://i.pravatar.cc/150?img=32" alt="Dr. Julian Vance" class="user-avatar" />
    </div>
  </div>
</header>
